spring:
  application:
    name: rate-limiter

  # H2 Database
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true

  # Redis (1차에서는 사용하지 않으므로 자동 설정 비활성화)
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Rate Limit 설정
rate-limit:
  default-limit: 100        # 로그인 사용자 기본 제한 (1분)
  anonymous-limit: 30        # 비로그인 사용자 제한 (1분)
  window-size: 60            # 윈도우 크기 (초)
